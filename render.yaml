databases:
  - name: sasci-db
    plan: free
    databaseName: sasci
    user: sasci

services:
  - type: web
    name: sasci-backend
    runtime: node
    plan: free
    rootDir: backend
    healthCheckPath: /api/health
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sasci-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
